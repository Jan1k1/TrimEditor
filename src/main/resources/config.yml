# TrimEditor config
# Edit armor trims from /te without opening a smithing table.
#
# Docs:    https://jan1k1.github.io/TrimEditor/
# GitHub:  https://github.com/Jan1k1/TrimEditor
# Issues:  https://github.com/Jan1k1/TrimEditor/issues
#
# Do not change config-version by hand. On startup TrimEditor adds any missing
# keys and bumps this number, keeping your existing values untouched.
config-version: 2

# Default setup is free editing. Turn on requirements or economy below if you
# want trims to cost items, money, or both.
requirements:
  # Master switch for item requirements.
  # When false, players only need permission to use the listed trims.
  enabled: false

  # Players need the matching smithing template for each pattern.
  # Pattern buttons are hidden when the player does not own that template.
  require-template: false

  # Players need the matching trim material item in their inventory.
  # Material buttons are hidden when the player does not own that item.
  require-material: false

  # Removes one template on apply when template requirements are enabled.
  # The item is taken only after the held armor fingerprint passes.
  consume-template: true

  # Removes one material item on apply when material requirements are enabled.
  # The item is taken only after the held armor fingerprint passes.
  consume-material: true

# Money cost is optional and uses Vault.
# Keep this disabled if you only want free edits or item-only costs.
economy:
  # Requires Vault and a Vault economy plugin.
  # If Vault or an economy provider is missing, money costs stay disabled.
  enabled: false

  # Money withdrawn on successful apply.
  # Nothing is charged if the held item changed or the trim cannot apply.
  cost: 0.0

# GUI safety settings.
# The editor accepts normal clicks only; quick-move, number keys and drags are ignored.
gui:
  # Minimum delay between accepted button clicks, per player, in milliseconds.
  # Guards against double-clicks and click-spam. 0 disables the cooldown.
  cooldown-ms: 300

# Sound played for each editor action.
# Set enabled to false for any action you want silent.
#
# Each entry takes:
#   enabled - play this sound at all
#   sound   - a namespaced sound key (minecraft:... or a resource pack key)
#   volume  - 0.0 and up; also controls how far the sound carries
#   pitch   - 0.5 (low) to 2.0 (high)
sounds:
  open:
    enabled: true
    sound: minecraft:block.smithing_table.use
    volume: 0.75
    pitch: 1.15
  select-pattern:
    enabled: true
    sound: minecraft:item.armor.equip_chain
    volume: 0.65
    pitch: 1.25
  select-material:
    enabled: true
    sound: minecraft:item.armor.equip_netherite
    volume: 0.65
    pitch: 1.35
  apply:
    enabled: true
    sound: minecraft:block.smithing_table.use
    volume: 0.9
    pitch: 1.0
  page:
    enabled: true
    sound: minecraft:item.book.page_turn
    volume: 0.6
    pitch: 1.2
  close:
    enabled: true
    sound: minecraft:block.chest.close
    volume: 0.5
    pitch: 1.0
  deny:
    enabled: true
    sound: minecraft:block.note_block.bass
    volume: 0.7
    pitch: 0.7
