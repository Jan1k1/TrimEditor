# TrimEditor configuration.
# Docs: https://jan1k1.github.io/TrimEditor/
#
# Do not change config-version by hand. On startup TrimEditor adds any missing
# keys and bumps this number, keeping your existing values untouched.
config-version: 2

requirements:
  # Master switch for item requirements. Default is free editing, so players
  # see every trim pattern and material they have permission for.
  enabled: false
  # When true, players need the matching smithing template for each pattern.
  # Pattern buttons are hidden when the player does not own that template.
  require-template: false
  # When true, players need the matching trim material item in their inventory.
  # Material buttons are hidden when the player does not own that item.
  require-material: false
  # Removes one template on apply when templates are required.
  # The item is taken only after the held armor fingerprint passes.
  consume-template: true
  # Removes one material item on apply when materials are required.
  # The item is taken only after the held armor fingerprint passes.
  consume-material: true

economy:
  # Requires Vault and a Vault economy plugin when enabled.
  # Leave false for free editing or item-only costs.
  enabled: false
  # Money withdrawn on successful apply.
  # Nothing is charged if the held item changed or the trim cannot apply.
  cost: 0.0

gui:
  # Minimum delay between accepted button clicks, per player, in milliseconds.
  # Guards against double-clicks and click-spam. 0 disables the cooldown.
  cooldown-ms: 300

# Sound played for each editor action. Each entry takes:
#   enabled - play this sound at all
#   sound   - a namespaced sound key (minecraft:... or a resource pack key)
#   volume  - 0.0 and up; also controls how far the sound carries
#   pitch   - 0.5 (low) to 2.0 (high)
sounds:
  open:
    enabled: true
    sound: minecraft:block.smithing_table.use
    volume: 0.75
    pitch: 1.15
  select-pattern:
    enabled: true
    sound: minecraft:item.armor.equip_chain
    volume: 0.65
    pitch: 1.25
  select-material:
    enabled: true
    sound: minecraft:item.armor.equip_netherite
    volume: 0.65
    pitch: 1.35
  apply:
    enabled: true
    sound: minecraft:block.smithing_table.use
    volume: 0.9
    pitch: 1.0
  page:
    enabled: true
    sound: minecraft:item.book.page_turn
    volume: 0.6
    pitch: 1.2
  close:
    enabled: true
    sound: minecraft:block.chest.close
    volume: 0.5
    pitch: 1.0
  deny:
    enabled: true
    sound: minecraft:block.note_block.bass
    volume: 0.7
    pitch: 0.7
