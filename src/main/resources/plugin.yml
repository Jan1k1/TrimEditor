name: TrimEditor
version: '${version}'
main: org.jan1k.plugin.trimeditor.TrimEditorPlugin
api-version: '1.21'
folia-supported: true
softdepend:
  - Vault
commands:
  trimeditor:
    aliases:
      - te
    permission: trimeditor.use
permissions:
  trimeditor.use:
    default: true
  trimeditor.reload:
    default: op
  trimeditor.admin:
    default: op
    children:
      trimeditor.reload: true
  trimeditor.bypass.cost:
    default: op
  trimeditor.pattern.*:
    default: true
  trimeditor.material.*:
    default: true
